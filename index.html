<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Forest Shuffle Score Sheet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#f4f1ea;
  --header:#4e5f42;
  --label:#dde4d3;
  --table:#ffffff;
  --border:#7a6a55;
  --total:#ece8df;
  --panel:#efe9de;
  --text:#111111;
}

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text);
}

body.dark{
  --bg:#1e1f1c;
  --header:#0f140f;
  --label:#31382d;
  --table:#242722;
  --border:#72756c;
  --total:#343830;
  --panel:#2b2f29;
  --text:#f1f1eb;
}

header{
  background:var(--header);
  color:#fff;
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

header h1{
  margin:0;
  font-size:20px;
  font-weight:700;
}

.controls{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

button{
  border:1px solid #fff;
  background:transparent;
  color:#fff;
  padding:6px 14px;
  border-radius:6px;
  font-weight:700;
  cursor:pointer;
}

button:hover{
  opacity:.9;
}

main{
  padding:0 0 20px 0;
}

.table-wrap{
  overflow:auto;
  max-height:60vh;
}

table{
  border-collapse:collapse;
  width:max-content;
  background:var(--table);
}

th,td{
  border:2px solid var(--border);
  text-align:center;
  height:52px;
  font-size:18px;
  color:var(--text);
}

/* player columns */
th:not(.label), td:not(.label){
  width:6.5ch;
  min-width:6.5ch;
}

/* left label column */
th.label, td.label{
  width:1%;
  white-space:nowrap;
  background:var(--label);
  text-align:left;
  padding:0 12px;
  font-weight:700;
  position:sticky;
  left:0;
  z-index:3;
}

/* sticky header */
thead th{
  background:var(--table);
  position:sticky;
  top:0;
  z-index:4;
}

/* top-left corner */
thead th.label{
  z-index:5;
  background:var(--label);
  text-align:center;
}

input.score{
  width:100%;
  height:100%;
  border:none;
  background:transparent;
  text-align:center;
  font-size:20px;
  font-weight:600;
  color:var(--text);
  padding:0;
}

input.name{
  width:100%;
  border:none;
  background:transparent;
  text-align:center;
  font-size:14px;
  font-weight:700;
  color:var(--text);
  padding:0;
}

input:focus{
  outline:none;
  background:rgba(255,255,255,.12);
}

td.total{
  background:var(--total);
  font-size:20px;
  font-weight:900;
}

.bottom-bar{
  padding:14px 16px 0 16px;
}

.bottom-bar button{
  border-color:var(--header);
  color:#fff;
  background:var(--header);
}

.history{
  margin:16px;
  padding:12px 14px;
  background:var(--panel);
  border:2px solid var(--border);
  border-radius:10px;
}

.history h2{
  margin:0 0 10px 0;
  font-size:18px;
}

.history-list{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.history-item{
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px 10px;
  background:var(--table);
}

.history-round{
  font-weight:800;
  margin-bottom:6px;
}

.history-scores{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}

.history-player{
  white-space:nowrap;
}

.empty-note{
  opacity:.75;
  font-style:italic;
}
</style>
</head>

<body>

<header>
  <h1>Forest Shuffle — Score Sheet</h1>
  <div class="controls">
    <button id="newRound">New Round</button>
    <button id="nightMode">Night Mode</button>
  </div>
</header>

<main>
  <div class="table-wrap">
    <table id="scoreTable">
      <thead>
        <tr>
          <th class="label" title="Forest Shuffle">
            <span style="font-size:24px; display:block;">🐿️</span>
          </th>
          <th><input class="name" placeholder="P1"></th>
          <th><input class="name" placeholder="P2"></th>
          <th><input class="name" placeholder="P3"></th>
          <th><input class="name" placeholder="P4"></th>
          <th><input class="name" placeholder="P5"></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <section class="history">
    <h2>Round History</h2>
    <div id="historyList" class="history-list">
      <div class="empty-note">No rounds recorded yet.</div>
    </div>
  </section>

  <div class="bottom-bar">
    <button id="resetAll">Reset All</button>
  </div>
</main>

<script>
const players = 5;
const tbody = document.querySelector("#scoreTable tbody");
const historyList = document.getElementById("historyList");
let roundNumber = 1;

function numOrZero(v){
  const n = Number(v);
  return Number.isFinite(n) ? n : 0;
}

const rows = [
  { key:"trees",  label:"Trees" },
  { key:"top",    label:"Top" },
  { key:"bottom", label:"Bottom" },
  { key:"sides",  label:"Left / Right" },
  { key:"cave",   label:"Cave" },
  { key:"total",  label:"Σ Total", total:true }
];

const inputsByPlayer = Array.from({length: players}, () => []);
const totalCells = [];
const nameInputs = [];

rows.forEach(row => {
  const tr = document.createElement("tr");

  const label = document.createElement("td");
  label.className = "label";
  label.textContent = row.label;
  tr.appendChild(label);

  for(let p = 0; p < players; p++){
    const td = document.createElement("td");

    if(row.total){
      td.className = "total";
      td.textContent = "0";
      totalCells[p] = td;
    } else {
      const input = document.createElement("input");
      input.type = "number";
      input.className = "score";
      input.value = "";
      input.addEventListener("input", updateTotals);
      td.appendChild(input);
      inputsByPlayer[p].push(input);
    }

    tr.appendChild(td);
  }

  tbody.appendChild(tr);
});

document.querySelectorAll("input.name").forEach((input, idx) => {
  nameInputs[idx] = input;
});

function updateTotals(){
  for(let p = 0; p < players; p++){
    let sum = 0;
    for(const inp of inputsByPlayer[p]){
      sum += numOrZero(inp.value);
    }
    totalCells[p].textContent = String(sum);
  }
}

function getPlayerName(index){
  const name = nameInputs[index].value.trim();
  return name || `P${index + 1}`;
}

function getCurrentRoundScores(){
  const results = [];
  for(let p = 0; p < players; p++){
    results.push({
      name: getPlayerName(p),
      score: totalCells[p].textContent
    });
  }
  return results;
}

function hasAnyData(){
  const anyNames = nameInputs.some(i => i.value.trim() !== "");
  const anyScores = inputsByPlayer.some(col => col.some(inp => inp.value.trim() !== ""));
  return anyNames || anyScores;
}

function recordRound(){
  const roundScores = getCurrentRoundScores();

  if(historyList.querySelector(".empty-note")){
    historyList.innerHTML = "";
  }

  const item = document.createElement("div");
  item.className = "history-item";

  const round = document.createElement("div");
  round.className = "history-round";
  round.textContent = `Round ${roundNumber}`;
  item.appendChild(round);

  const scores = document.createElement("div");
  scores.className = "history-scores";

  roundScores.forEach(entry => {
    const span = document.createElement("div");
    span.className = "history-player";
    span.textContent = `${entry.name}: ${entry.score}`;
    scores.appendChild(span);
  });

  item.appendChild(scores);
  historyList.appendChild(item);
  roundNumber++;
}

function clearScoresOnly(){
  document.querySelectorAll("input.score").forEach(i => i.value = "");
  updateTotals();
}

function resetAll(){
  document.querySelectorAll("input.score").forEach(i => i.value = "");
  document.querySelectorAll("input.name").forEach(i => i.value = "");
  historyList.innerHTML = '<div class="empty-note">No rounds recorded yet.</div>';
  roundNumber = 1;
  updateTotals();
}

document.getElementById("newRound").addEventListener("click", () => {
  if(!hasAnyData()) return;
  recordRound();
  clearScoresOnly();
});

document.getElementById("nightMode").addEventListener("click", () => {
  document.body.classList.toggle("dark");
});

document.getElementById("resetAll").addEventListener("click", () => {
  resetAll();
});

updateTotals();
</script>

</body>
</html>
