<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Forest Shuffle Score Sheet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --green:#556b4e;
  --parchment:#f4f1ea;
  --stone:#7a6a55;
  --label:#dde4d3;
  --header:#f7f5ef;
  --total:#ece8df;
}

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--parchment);
}

header{
  background:linear-gradient(#5e6f4e,#4e5f42);
  color:#fff;
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:700;
  font-size:20px;
}

button{
  border:1px solid #fff;
  background:transparent;
  color:#fff;
  padding:6px 14px;
  border-radius:6px;
  font-weight:700;
  cursor:pointer;
}

.table-wrap{
  overflow:auto;
  max-height:calc(100vh - 60px);
}

table{
  border-collapse:collapse;
  width:max-content;
  background:#fff;
}

th,td{
  border:2px solid var(--stone);
  text-align:center;
  height:52px;
  font-size:18px;
}

/* player columns */
th:not(.label), td:not(.label){
  width:6.5ch;
  min-width:6.5ch;
}

/* label column */
th.label, td.label{
  width:1%;
  white-space:nowrap;
  background:var(--label);
  text-align:left;
  padding:0 12px;
  font-weight:700;

  position:sticky;
  left:0;
  z-index:3;
}

/* sticky header */
thead th{
  background:var(--header);
  position:sticky;
  top:0;
  z-index:4;
}

/* top-left corner */
thead th.label{
  z-index:5;
  background:var(--label);
  text-align:center;
}

/* score cells */
input.score{
  width:100%;
  height:100%;
  border:none;
  background:transparent;
  text-align:center;
  font-size:20px;
  font-weight:600;
}

/* player name inputs */
input.name{
  width:100%;
  border:none;
  background:transparent;
  text-align:center;
  font-size:14px;
  font-weight:700;
}

input:focus{
  outline:none;
  background:#fffdf7;
}

td.total{
  background:var(--total);
  font-size:20px;
  font-weight:900;
}
</style>
</head>

<body>

<header>
  <div>Forest Shuffle — Score Sheet</div>
  <button id="reset">Reset All</button>
</header>

<div class="table-wrap">
<table id="scoreTable">
<thead>
<tr>
<th class="label">🐿️</th>
<th><input class="name" placeholder="P1"></th>
<th><input class="name" placeholder="P2"></th>
<th><input class="name" placeholder="P3"></th>
<th><input class="name" placeholder="P4"></th>
<th><input class="name" placeholder="P5"></th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script>
const players = 5;
const tbody = document.querySelector("#scoreTable tbody");

function numOrZero(v){
const n = Number(v);
return Number.isFinite(n) ? n : 0;
}

const rows = [
{ key:"trees", label:"Trees" },
{ key:"top", label:"Top" },
{ key:"bottom", label:"Bottom" },
{ key:"sides", label:"Left / Right" },
{ key:"cave", label:"Cave" },
{ key:"total", label:"Σ Total", total:true }
];

const inputsByPlayer = Array.from({length: players}, () => []);
const totalCells = [];

rows.forEach(row=>{
const tr=document.createElement("tr");

const label=document.createElement("td");
label.className="label";
label.textContent=row.label;
tr.appendChild(label);

for(let p=0;p<players;p++){

const td=document.createElement("td");

if(row.total){
td.className="total";
td.textContent="0";
totalCells[p]=td;
}
else{

const input=document.createElement("input");
input.type="number";
input.className="score";
input.value="";

input.addEventListener("input",updateTotals);

td.appendChild(input);
inputsByPlayer[p].push(input);
}

tr.appendChild(td);
}

tbody.appendChild(tr);
});

function updateTotals(){

for(let p=0;p<players;p++){

let sum=0;

for(const inp of inputsByPlayer[p]){
sum+=numOrZero(inp.value);
}

totalCells[p].textContent=String(sum);
}

}

document.getElementById("reset").onclick=()=>{
document.querySelectorAll("input.score").forEach(i=>i.value="");
document.querySelectorAll("input.name").forEach(i=>i.value="");
updateTotals();
};

updateTotals();
</script>

</body>
</html>
