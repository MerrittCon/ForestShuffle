<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Forest Shuffle Score Pad</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#f4f1ea;
  --header:#4e5f42;
  --label:#dde4d3;
  --table:#ffffff;
  --border:#7a6a55;
  --total:#ece8df;
}

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:#000;
}

body.dark{
  --bg:#1e1e1e;
  --header:#000;
  --label:#333;
  --table:#222;
  --border:#666;
  --total:#333;
  color:#eee;
}

header{
  background:var(--header);
  color:#fff;
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:8px;
}

.controls{
  display:flex;
  gap:8px;
}

button{
  border:1px solid #fff;
  background:transparent;
  color:#fff;
  padding:6px 12px;
  border-radius:6px;
  font-weight:700;
  cursor:pointer;
}

.table-wrap{
  overflow:auto;
  max-height:calc(100vh - 70px);
}

table{
  border-collapse:collapse;
  width:max-content;
  background:var(--table);
}

th,td{
  border:2px solid var(--border);
  text-align:center;
  height:52px;
  font-size:18px;
}

/* player columns */
th:not(.label), td:not(.label){
  width:6.5ch;
  min-width:6.5ch;
}

/* left column */
th.label, td.label{
  width:1%;
  white-space:nowrap;
  background:var(--label);
  text-align:left;
  padding:0 12px;
  font-weight:700;

  position:sticky;
  left:0;
  z-index:3;
}

/* header row */
thead th{
  position:sticky;
  top:0;
  z-index:4;
  background:var(--table);
}

thead th.label{
  z-index:5;
  text-align:center;
}

/* score cells */
input.score{
  width:100%;
  height:100%;
  border:none;
  background:transparent;
  text-align:center;
  font-size:20px;
  font-weight:600;
}

/* player names */
input.name{
  width:100%;
  border:none;
  background:transparent;
  text-align:center;
  font-weight:700;
}

input:focus{
  outline:none;
}

td.total{
  background:var(--total);
  font-weight:900;
}
</style>
</head>

<body>

<header>
<div>Forest Shuffle Score Pad</div>

<div class="controls">
<button id="newRound">New Round</button>
<button id="reset">Reset All</button>
<button id="night">Night Mode</button>
</div>

</header>

<div class="table-wrap">
<table id="scoreTable">

<thead>
<tr>
<th class="label">🐿️</th>
<th><input class="name" placeholder="P1"></th>
<th><input class="name" placeholder="P2"></th>
<th><input class="name" placeholder="P3"></th>
<th><input class="name" placeholder="P4"></th>
<th><input class="name" placeholder="P5"></th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>

<script>
const players=5
const tbody=document.querySelector("#scoreTable tbody")

function numOrZero(v){
const n=Number(v)
return Number.isFinite(n)?n:0
}

/* Forest Shuffle rows (same as Dartmoor except no Moors) */

const rows=[
{key:"trees",label:"Trees"},
{key:"top",label:"Top"},
{key:"bottom",label:"Bottom"},
{key:"sides",label:"Left / Right"},
{key:"cave",label:"Cave"},
{key:"total",label:"Σ Total",total:true}
]

const inputsByPlayer=Array.from({length:players},()=>[])
const totals=[]

rows.forEach(row=>{
const tr=document.createElement("tr")

const label=document.createElement("td")
label.className="label"
label.textContent=row.label
tr.appendChild(label)

for(let p=0;p<players;p++){

const td=document.createElement("td")

if(row.total){

td.className="total"
td.textContent="0"
totals[p]=td

}else{

const input=document.createElement("input")
input.type="number"
input.className="score"
input.value=""

input.addEventListener("input",updateTotals)

td.appendChild(input)
inputsByPlayer[p].push(input)

}

tr.appendChild(td)
}

tbody.appendChild(tr)
})

function updateTotals(){

for(let p=0;p<players;p++){

let sum=0

for(const inp of inputsByPlayer[p])
sum+=numOrZero(inp.value)

totals[p].textContent=sum
}

}

/* reset all */

document.getElementById("reset").onclick=()=>{
document.querySelectorAll("input.score").forEach(i=>i.value="")
document.querySelectorAll("input.name").forEach(i=>i.value="")
updateTotals()
}

/* new round (clears scores but keeps names) */

document.getElementById("newRound").onclick=()=>{
document.querySelectorAll("input.score").forEach(i=>i.value="")
updateTotals()
}

/* night mode */

document.getElementById("night").onclick=()=>{
document.body.classList.toggle("dark")
}

updateTotals()
</script>

</body>
</html>
